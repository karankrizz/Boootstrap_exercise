<html>
  <head>
    <title>Bootstrap Toggle</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <div class="container-fluid">
      <div class="container">
        <button
          class="btn btn-success mt-3 rounded-pill"
          data-bs-toggle="collapse"
          data-bs-target="#dummy"
        >
          Click
        </button>

        <div class="collapse mt-4 text-white bg-danger" id="dummy">
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Beatae
            molestias adipisci deleniti ex quisquam error! Velit, odit! Dolore,
            magnam illo unde incidunt aut nostrum reiciendis?
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
