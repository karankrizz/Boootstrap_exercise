<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Spacing / Utilities</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container-fluid">
      <button
        class="btn btn-warning"
        data-bs-toggle="modal"
        data-bs-target="#box"
      >
        Click to pop
      </button>
    </div>

    <div class="container mt-5">
      <div class="modal" id="box">
        <div class="modal-dialog">
          <div class="modal-content ">
            <div class="modal-header bg-success">
              <h1>Popup</h1>
            </div>
            <div class="modal-body">
              <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
                Expedita, ea cumque fuga qui illo, soluta aliquam nihil itaque
                nam, repudiandae fugiat voluptatibus ipsam magnam quae.
              </p>
            </div>
            <div class="modal-footer">
              <button type="button"   class="btn-close bg-danger" data-bs-dismiss="modal"></button>
              close
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="js-config">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
  </body>
</html>
