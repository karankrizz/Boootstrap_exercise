<html>
  <head>
    <title>Bootstrap Toggle</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="dropdown">
      <button
        class="btn btn-info dropdown-toggle"
        data-bs-toggle="dropdown"
        data-bs-target="#menu-content"
      >
        courses
      </button>

      <div class="dropdown-menu" id="menu-content">
        <nav class="navbar">
          <ul class="navbar-nav ms-3">
            <li class="nav-item"><a class="nav-link" href="#">Angular</a></li>
            <li class="nav-item"><a class="nav-link" href="#">React</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Nest Js</a></li>
          </ul>
        </nav>
      </div>
    </div>

    <div class="js-config">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
  </body>
</html>
