<html>
  <head>
    <title>Bootstrap carausel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-fluid">
      <div class="title bg-primary text-white text-center">
        <h1>Bootstrap Form</h1>
      </div>
      <form action="">
        <div class="container">
          <label for="username" class="form-label">
            Canditate name <span class="text-danger">*</span></label
          >
          <input
            type="text"
            class="form-control"
            placeholder="Enter your name"
            name="username"
            id="username"
            required
          />
          <label for="password" class="form-label">
            Canditate password <span class="text-danger">*</span></label
          >
          <input
            type="password"
            class="form-control"
            placeholder="Enter your password"
            name="password"
            id="password"
            required
          />
        </div>
        <div class="container mt-3">
          <button type="submit" class="btn-primary btn">Submit</button>
          <button type="reset" class="btn btn-danger">Cancel</button>
        </div>
      </form>
    </div>
  </body>
</html>
